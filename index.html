<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울 맛거리 & 볼거리 전통시장</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-controls">
                <div class="lang-selector">
                    <button class="lang-btn active" data-lang="ko">KO</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ja">JP</button>
                    <button class="lang-btn" data-lang="zh">CN</button>
                </div>
                <button id="theme-toggle" class="theme-toggle" title="테마 변경">🌓</button>
            </div>
            <h1 id="main-title">서울 맛거리 & 볼거리 전통시장</h1>
            <p id="main-subtitle" class="subtitle">서울의 정과 맛이 살아있는 구별 대표 전통시장 가이드</p>
        </div>
    </header>

    <nav class="filter-bar">
        <div id="filter-container" class="container">
            <!-- Filter buttons will be injected here by main.js -->
        </div>
    </nav>

    <main class="container">
        <div id="markets-container" class="market-grid">
            <!-- Market cards will be injected here by main.js -->
        </div>
    </main>

    <section class="contact-section">
        <div class="container">
            <div class="contact-card">
                <h2 id="contact-title">제휴 및 문의</h2>
                <p id="contact-subtitle">서울 전통시장 가이드와 함께할 파트너를 기다립니다.</p>
                <form action="https://formspree.io/f/xreynrvb" method="POST" class="contact-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name" id="label-name">이름 / 업체명</label>
                            <input type="text" name="name" id="name" required placeholder="홍길동">
                        </div>
                        <div class="form-group">
                            <label for="email" id="label-email">이메일 주소</label>
                            <input type="email" name="email" id="email" required placeholder="example@mail.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="message" id="label-message">문의 내용</label>
                        <textarea name="message" id="message" rows="5" required placeholder="문의하실 내용을 입력해주세요."></textarea>
                    </div>
                    <button type="submit" class="submit-btn" id="btn-submit">문의하기</button>
                </form>
            </div>
        </div>
    </section>

    <section class="comments-section">
        <div class="container">
            <div id="disqus_thread"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = window.location.href;  
                    this.page.identifier = window.location.pathname; 
                };
                (function() {
                    var d = document, s = d.createElement('script');
                    s.src = 'https://productbak.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
        </div>
    </section>

    <footer>
        <div class="container">
            <p id="footer-text">&copy; 2026 서울 전통시장 가이드. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
