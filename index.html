<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울 맛거리 & 볼거리 전통시장</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-controls">
                <div class="lang-selector">
                    <button class="lang-btn active" data-lang="ko">KO</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="ja">JP</button>
                    <button class="lang-btn" data-lang="zh">CN</button>
                </div>
                <button id="theme-toggle" class="theme-toggle" title="테마 변경">🌓</button>
            </div>
            <h1 id="main-title">서울 맛거리 & 볼거리 전통시장</h1>
            <p id="main-subtitle" class="subtitle">서울의 정과 맛이 살아있는 구별 대표 전통시장 가이드</p>
        </div>
    </header>

    <nav class="filter-bar">
        <div id="filter-container" class="container">
            <!-- Filter buttons will be injected here by main.js -->
        </div>
    </nav>

    <main class="container">
        <div id="markets-container" class="market-grid">
            <!-- Market cards will be injected here by main.js -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p id="footer-text">&copy; 2026 서울 전통시장 가이드. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
